<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Why: Core metadata is required for a Chrome extension popup. -->
    <meta charset="UTF-8" />

    <!-- Why: This ensures the popup scales correctly on different screen sizes. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Why: The popup title appears in the extension context. -->
    <title>Veritas</title>

    <!-- Why: Popup styling is isolated from the active webpage. -->
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <!-- Why: The header provides branding and a live system-state indicator. -->
    <header class="top">
      <div class="brand">
        <!-- Why: The logo reinforces product identity and trust. -->
        <img src="icons/48.png" alt="Veritas logo" class="logoImg" />

        <!-- Why: The title anchors the product name in the popup UI. -->
        <h1 class="title">Veritas</h1>
      </div>

      <!-- Why: popup.js updates this pill to reflect pipeline state. -->
      <span id="statusPill" class="pill">Idle</span>
    </header>

    <!-- Why: The main card contains the full user workflow and results surface. -->
    <main class="card">
      <!-- Why: This empty state appears before the first successful analysis. -->
      <div class="hero" id="heroSection">
        <div class="heroTitle">No analysis yet</div>
        <div class="heroSub">Open a news article, then estimate its political leaning.</div>
      </div>

      <!-- Why: This is the single entry point for extraction plus leaning analysis. -->
      <button id="analyzeBtn" class="primary">Analyze Leaning</button>

      <!-- Why: These diagnostics help verify extraction during development. -->
      <div id="extractDebug">
        <div id="extractStats"></div>
        <textarea id="extractPreview" readonly></textarea>
      </div>

      <!-- Why: This section surfaces basic metadata about the analyzed article. -->
      <section class="section">
        <button
          class="sectionHdr"
          type="button"
          aria-expanded="false"
          data-target="overviewBody"
        >
          <span>Article Overview</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>

        <div id="overviewBody" class="sectionBody" hidden>
          <div class="row">
            <span class="k">Source</span>
            <span id="sourceValue" class="v">—</span>
          </div>

          <div class="row">
            <span class="k">Publication date</span>
            <span id="pubDateValue" class="v">—</span>
          </div>

          <div class="row">
            <span class="k">Claims detected</span>
            <span id="claimsValue" class="v">0</span>
          </div>
        </div>
      </section>

      <!-- Why: Claims remain useful because they show which article statements fed the analysis. -->
      <section class="section">
        <button
          class="sectionHdr"
          type="button"
          aria-expanded="false"
          data-target="claimsBody"
        >
          <span>Extracted Claims</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>

        <div id="claimsBody" class="sectionBody" hidden>
          <ol id="claimsList"></ol>
        </div>
      </section>

      <!-- Why: This section explains the final leaning estimate in plain language. -->
      <section class="section">
        <button
          class="sectionHdr"
          type="button"
          aria-expanded="false"
          data-target="verdictBody"
        >
          <span>Leaning Summary</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>

        <div id="verdictBody" class="sectionBody" hidden>
          <div id="verdictPill" class="verdict">Unclear</div>
          <div id="verdictSummary" class="hint">
            Political leaning analysis not yet run.
          </div>
        </div>
      </section>

      <!-- Why: This section exposes the three internal bias signals plus confidence so the result feels less like a black box. -->
      <section class="section">
        <button
          class="sectionHdr"
          type="button"
          aria-expanded="false"
          data-target="signalsBody"
        >
          <span>Bias Signals</span>
          <span class="chev" aria-hidden="true">▾</span>
        </button>

        <div id="signalsBody" class="sectionBody" hidden>
          <div class="row">
            <span class="k">Confidence</span>
            <span id="confidenceValue" class="v">0%</span>
          </div>

          <div class="row">
            <span class="k">Source bias</span>
            <span id="sourceBiasValue" class="v">0.00</span>
          </div>

          <div class="row">
            <span class="k">Language bias</span>
            <span id="languageBiasValue" class="v">0.00</span>
          </div>

          <div class="row">
            <span class="k">Framing bias</span>
            <span id="framingBiasValue" class="v">0.00</span>
          </div>
        </div>
      </section>
    </main>

    <!-- Why: Footer keeps secondary actions and versioning visible but separate from analysis. -->
    <footer class="foot">
      <button id="settingsBtn" class="linkBtn" type="button">
        Settings
      </button>
      <span class="ver">v0.4.0</span>
    </footer>

    <!-- Why: popup.js controls extraction, API calls, and UI updates. -->
    <script src="popup.js"></script>
  </body>
</html>
