<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Why: Standard metadata keeps the dedicated settings popup page consistent with the main popup. -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Veritas Settings</title>
    <link rel="stylesheet" href="settings.css" />
  </head>

  <body>
    <!-- Why: The header keeps navigation simple and gives the user a clear way to leave settings. -->
    <header class="top">
      <button id="backBtn" class="backBtn" type="button">← Back</button>
      <h1 class="pageTitle">Settings</h1>
    </header>

    <!-- Why: A single card keeps all preferences grouped into one predictable surface. -->
    <main class="card">
      <div class="sectionTitle">Appearance</div>

      <!-- Why: A switch fits the mental model of turning a UI feature on or off more naturally than a checkbox. -->
      <label class="settingRow">
        <span class="settingLabel">Dark mode</span>

        <span class="switch">
          <input id="darkModeToggle" type="checkbox" />
          <span class="slider"></span>
        </span>
      </label>

      <div class="sectionTitle">Visible sections</div>

      <label class="settingRow">
        <span class="settingLabel">Article Overview</span>

        <span class="switch">
          <input id="showOverviewToggle" type="checkbox" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="settingRow">
        <span class="settingLabel">Extracted Claims</span>

        <span class="switch">
          <input id="showClaimsToggle" type="checkbox" />
          <span class="slider"></span>
        </span>
      </label>

      <label class="settingRow">
        <span class="settingLabel">Extraction text box</span>

        <span class="switch">
          <input id="showDebugToggle" type="checkbox" />
          <span class="slider"></span>
        </span>
      </label>

      <!-- Why: This note clarifies that Leaning Summary is intentionally always visible. -->
      <p class="note">
        Leaning Summary and Bias Signals always remains visible.
      </p>
    </main>

    <script src="settings.js"></script>
  </body>
</html>
